name: Manual Discord Release Notification

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to resend (leave empty for latest)'
        required: false
        default: ''

jobs:
  manual-release:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release info
        id: release
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
            echo "No tag provided, using latest: $TAG"
          else
            echo "Using provided tag: $TAG"
          fi

          BODY_FILE=release_body.txt
          gh release view "$TAG" --json body --jq '.body' > "$BODY_FILE"
          URL=$(gh release view "$TAG" --json url --jq '.url')
          AUTHOR=$(gh release view "$TAG" --json author --jq '.author.login')
          AVATAR=$(gh release view "$TAG" --json author --jq '.author.avatarUrl')

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "body_file=$BODY_FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "avatar=$AVATAR" >> $GITHUB_OUTPUT

      - name: Send manual release notification
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          BODY_FILE="${{ steps.release.outputs.body_file }}"
          URL="${{ steps.release.outputs.url }}"
          AUTHOR="${{ steps.release.outputs.author }}"
          AVATAR="${{ steps.release.outputs.avatar }}"

          jq -n \
            --rawfile body "$BODY_FILE" \
            --arg title   "🧰 MGSHDFix Update Released! $TAG" \
            --arg tag     "$TAG" \
            --arg author  "$AUTHOR" \
            --arg authoru "https://github.com/$AUTHOR" \
            --arg avatar  "$AVATAR" \
            --arg url     "$URL" \
            '
            def changelog($b):
              ($b // "") | gsub("\r\n"; "\n") | split("\n## Installation")[0];

            def where_to_download($tag):
              "## Where to Download\n\n" +
              "**Nexus Mods:**\n" +
              "• [MG1 / MG2SS](https://www.nexusmods.com/metalgearandmetalgear2mc/mods/9)\n" +
              "• [MGS2](https://www.nexusmods.com/metalgearsolid2mc/mods/49)\n" +
              "• [MGS3](https://www.nexusmods.com/metalgearsolid3mc/mods/139)\n\n" +
              "**GitHub Releases:**\n" +
              "• [MGSHDFix " + $tag + "](https://github.com/Lyall/MGSHDFix/releases)";

            {
              embeds: [{
                title: $title,
                description: (changelog($body) + "\n\n" + where_to_download($tag)),
                url: $url,
                color: 7506394,
                author: { name: ("@" + $author), url: $authoru, icon_url: $avatar }
              }]
            }' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

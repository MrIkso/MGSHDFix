name: Manual Discord Release Notification

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to resend (leave empty for latest)'
        required: false
        default: ''

jobs:
  manual-release:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release info
        id: release
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
            echo "No tag provided, using latest: $TAG"
          else
            echo "Using provided tag: $TAG"
          fi

          BODY_FILE=body.txt
          gh release view "$TAG" --json body --jq '.body' > "$BODY_FILE"
          URL=$(gh release view "$TAG" --json url --jq '.url')
          AUTHOR=$(gh release view "$TAG" --json author --jq '.author.login')
          AVATAR=$(gh release view "$TAG" --json author --jq '.author.avatarUrl')

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "body_file=$BODY_FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "avatar=$AVATAR" >> $GITHUB_OUTPUT

      - name: Send manual release notification
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          BODY_FILE="${{ steps.release.outputs.body_file }}"
          URL="${{ steps.release.outputs.url }}"
          AUTHOR="${{ steps.release.outputs.author }}"
          AVATAR="${{ steps.release.outputs.avatar }}"

          # Clean body (remove Installation section and CRLF safely)
          BODY_CLEAN=$(cat "$BODY_FILE" | sed 's/\r$//' | awk 'BEGIN{ORS="\n"} {print}' | sed '/^## Installation/,$d')

          jq -n \
            --arg title   "🧰 MGSHDFix Manual Release! $TAG" \
            --arg body    "$BODY_CLEAN" \
            --arg url     "$URL" \
            --arg author  "$AUTHOR" \
            --arg avatar  "$AVATAR" \
            '{
              embeds: [{
                title: $title,
                description: $body,
                url: $url,
                color: 7506394,
                author: { name: ("@" + $author), url: ("https://github.com/" + $author), icon_url: $avatar }
              }]
            }' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

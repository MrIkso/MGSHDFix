name: Discord Notifications

on:
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, converted_to_draft]
  release:
    types: [published]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Check webhook
        if: ${{ env.DISCORD_WEBHOOK == '' }}
        run: |
          echo "Missing DISCORD_WEBHOOK secret"
          exit 1

      # 🆕 New Mission (Issue opened)
      - name: Issue opened
        if: ${{ github.event_name == 'issues' && github.event.action == 'opened' }}
        run: |
          jq -n \
            --arg t "🆕 New Mission by @${{ github.event.issue.user.login }}" \
            --arg num "${{ github.event.issue.number }}" \
            --arg title "${{ github.event.issue.title }}" \
            --arg url "${{ github.event.issue.html_url }}" \
            --arg body "${{ github.event.issue.body }}" \
            '{
              embeds:[{
                title:$t,
                description:(
                  "**[#" + $num + "](" + $url + ") " + $title + "**\n\n" +
                  (if ($body|length)>2048 then ($body[0:2048] + "...") else $body end)
                ),
                url:$url,
                color:15158332
              }]
            }' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"


      # 🗂️ Mission Resolved (Issue closed)
      - name: Issue closed
        if: ${{ github.event_name == 'issues' && github.event.action == 'closed' }}
        run: |
          closer='${{ github.actor }}'
          jq -n \
            --arg t "🗂️ Mission Resolved by @$closer" \
            --arg num "${{ github.event.issue.number }}" \
            --arg title "${{ github.event.issue.title }}" \
            --arg url "${{ github.event.issue.html_url }}" \
            --arg body "${{ github.event.issue.body }}" \
            '{
              embeds:[{
                title:$t,
                description:(
                  "**[#" + $num + "](" + $url + ") " + $title + "**\n\n" +
                  (if ($body|length)>2048 then ($body[0:2048] + "...") else $body end)
                ),
                url:$url,
                color:8359053
              }]
            }' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"


      # 📨 Intel Package Received (PR opened)
      - name: PR opened
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'opened' }}
        run: |
          jq -n \
            --arg t "📨 Intel Package Received by @${{ github.event.pull_request.user.login }}" \
            --arg num "${{ github.event.pull_request.number }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg user "${{ github.event.pull_request.user.login }}" \
            --arg user_url "https://github.com/${{ github.event.pull_request.user.login }}" \
            --arg avatar "${{ github.event.pull_request.user.avatar_url }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            '{embeds:[{title:$t,description:( "**[#" + $num + "](" + $url + ") " + $title + "**" ),url:$url,color:3447003,author:{name:("@" + $user),url:$user_url,icon_url:$avatar}}]}' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      # ✅ Extraction Complete / ❌ Request Denied (PR closed/merged)
      - name: PR closed or merged
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}
        run: |
          merged='${{ github.event.pull_request.merged }}'
          if [ "$merged" = "true" ]; then
            status="✅ Extraction Complete"; color=3066993
            extra="${{ github.event.pull_request.head.ref }} -> ${{ github.event.pull_request.base.ref }}"
          else
            status="❌ Request Denied"; color=9803374
            extra=""
          fi

          actor='${{ github.actor }}'
          actor_url="https://github.com/${{ github.actor }}"
          avatar='${{ github.event.sender.avatar_url }}'

          jq -n \
            --arg t "$status by @$actor" \
            --arg num "${{ github.event.pull_request.number }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg extra "$extra" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg actor "$actor" \
            --arg actor_url "$actor_url" \
            --arg avatar "$avatar" \
            --argjson c "$color" \
            '{
              embeds:[{
                title:$t,
                description:(
                  "**[#" + $num + "](" + $url + ") " + $title + "**" +
                  (if ($extra|length)>0 then "\n"+$extra else "" end)
                ),
                url:$url,
                color:$c,
                author:{name:("@" + $actor),url:$actor_url,icon_url:$avatar}
              }]
            }' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      # 🧰 MGSHDFix Update Released! (Release)
      - name: Release published
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        run: |
          echo "${{ github.event.release.body }}" > release_body.txt
          jq -n \
            --rawfile body release_body.txt \
            --arg title   "🧰 MGSHDFix Update Released! ${{ github.event.release.tag_name }}" \
            --arg tag     "${{ github.event.release.tag_name }}" \
            --arg author  "${{ github.event.release.author.login }}" \
            --arg authoru "https://github.com/${{ github.event.release.author.login }}" \
            --arg avatar  "${{ github.event.release.author.avatar_url }}" \
            --arg url     "${{ github.event.release.html_url }}" \
            '
            def changelog($b):
              ($b // "") | gsub("\r\n"; "\n") | split("\n## Installation")[0];

            def where_to_download($tag):
              "## Where to Download\n\n" +
              "**Nexus Mods:**\n" +
              "• [MG1 / MG2SS](https://www.nexusmods.com/metalgearandmetalgear2mc/mods/9)\n" +
              "• [MGS2](https://www.nexusmods.com/metalgearsolid2mc/mods/49)\n" +
              "• [MGS3](https://www.nexusmods.com/metalgearsolid3mc/mods/139)\n\n" +
              "**GitHub Releases:**\n" +
              "• [MGSHDFix " + $tag + "](https://github.com/Lyall/MGSHDFix/releases)";

            {
              embeds: [{
                title: $title,
                description: (changelog($body) + "\n\n" + where_to_download($tag)),
                url: $url,
                color: 7506394,
                author: { name: ("@" + $author), url: $authoru, icon_url: $avatar }
              }]
            }' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      # 📡 Codec Update (push), suppressed for PR merges
      - name: Push to master
        if: >
          ${{
            github.event_name == 'push' &&
            startsWith(github.ref, 'refs/heads/master') &&
            github.event.pusher.name != 'web-flow' &&
            github.actor != 'github-actions' &&
            (github.event.head_commit && !startsWith(github.event.head_commit.message, 'Merge pull request'))
          }}
        run: |
          echo '${{ toJson(github.event.commits) }}' > commits.json

          lines=$(jq -r '
            .[0:5]
            | map("- [" + (.id[0:7]) + "](" + .url + ") " + (((.message // "(no commit message)") | split("\n")[0])))
            | join("\n")
            | @json
          ' commits.json)
          count=$(jq 'length' commits.json)
          compare='${{ github.event.compare }}'
          authors=$(jq -r '[.[].author.username // .[].author.name // "unknown"] | unique | map("@" + .) | join(", ")' commits.json)

          if [ "$count" -eq 1 ]; then
            author_line="$authors — 1 commit"
          else
            author_line="$authors — $count commits"
          fi

          actor='${{ github.actor }}'
          actor_url="https://github.com/${{ github.actor }}"
          avatar='${{ github.event.sender.avatar_url }}'

          jq -n \
            --arg t "📡 Codec Update" \
            --argjson lines "$lines" \
            --arg u "$compare" \
            --arg author_line "$author_line" \
            --arg actor "$actor" \
            --arg actor_url "$actor_url" \
            --arg avatar "$avatar" \
            '{
              embeds:[{
                title:$t,
                description:$lines,
                url:$u,
                color:5814783,
                author:{name:$author_line, url:$actor_url, icon_url:$avatar}
              }]
            }' \
          | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
